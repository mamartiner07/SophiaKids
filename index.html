<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOPHIA KIDS | Academia de Héroes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff00c8;
            --bg: #030712;
            --surface: rgba(15, 23, 42, 0.6);
            --border: rgba(0, 242, 255, 0.3);
            --text: #f0f9ff;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --hp-color: #ff2e63;
            --energy-color: #00f2ff;
            --xp-color: #ffde7d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.08) 0%, transparent 40%);
        }

        /* Glass Noise Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03;
            pointer-events: none;
            z-index: 100;
        }

        #heroCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
        }

        .container {
            width: 95%;
            max-width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        /* RPG Stats Header */
        #rpg-stats {
            display: none;
            width: 100%;
            padding: 1rem;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            justify-content: space-around;
            gap: 1rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .stat-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
        }

        .bar-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #hp-fill {
            background: var(--hp-color);
            box-shadow: 0 0 10px var(--hp-color);
        }

        #energy-fill {
            background: var(--energy-color);
            box-shadow: 0 0 10px var(--energy-color);
        }

        #xp-fill {
            background: var(--xp-color);
            box-shadow: 0 0 10px var(--xp-color);
        }

        /* Sophia Avatar Core */
        #sophia-avatar {
            width: 120px;
            height: 120px;
            position: relative;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .core-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            filter: blur(15px);
            animation: pulseCore 3s infinite ease-in-out;
            opacity: 0.5;
        }

        .core-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--primary);
            border-radius: 50%;
            padding: 5px;
            border-left-color: transparent;
            border-bottom-color: transparent;
            animation: rotateCore 2s linear infinite;
        }

        .core-inner {
            width: 60px;
            height: 60px;
            background: var(--bg);
            border: 3px solid var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px var(--primary), 0 0 20px var(--primary);
            z-index: 2;
        }

        /* Mission Objective Widget */
        #objective-widget {
            display: none;
            width: 100%;
            background: linear-gradient(90deg, var(--surface), transparent);
            border-left: 4px solid var(--primary);
            padding: 1rem;
            border-radius: 0 12px 12px 0;
            margin-bottom: 0.5rem;
        }

        .objective-title {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        #current-objective {
            font-size: 1rem;
            font-weight: 600;
        }

        header {
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.4));
        }

        .btn-primary {
            position: relative;
            padding: 1.25rem 3rem;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--bg);
            background: var(--primary);
            border: none;
            border-radius: 100px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.3);
            text-transform: uppercase;
            gap: 12px;
        }

        #log-container {
            width: 100%;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            display: none;
            flex-direction: column;
            gap: 1rem;
            max-height: 300px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .log-entry {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-hero {
            color: var(--primary);
            background: rgba(0, 242, 255, 0.03);
            border-left: 4px solid var(--primary);
        }

        .log-user {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid #fff;
        }

        @keyframes pulseCore {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }
        }

        @keyframes rotateCore {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .visual-alert {
            border-color: var(--hp-color) !important;
            box-shadow: 0 0 30px rgba(255, 46, 99, 0.2);
        }

        .visual-success {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.2);
        }
    </style>

    .hidden {
    display: none !important;
    }
    </style>
</head>

<body>
    <canvas id="heroCanvas"></canvas>

    <div class="container">
        <!-- RPG Stats -->
        <div id="rpg-stats">
            <div class="stat-group">
                <div class="stat-label"><span>Integridad (HP)</span><span id="hp-val">100%</span></div>
                <div class="bar-bg">
                    <div id="hp-fill" class="bar-fill"></div>
                </div>
            </div>
            <div class="stat-group">
                <div class="stat-label"><span>Sincronía (EN)</span><span id="energy-val">100%</span></div>
                <div class="bar-bg">
                    <div id="energy-fill" class="bar-fill"></div>
                </div>
            </div>
            <div class="stat-group">
                <div class="stat-label"><span>Rango (XP)</span><span id="xp-val">0</span></div>
                <div class="bar-bg">
                    <div id="xp-fill" class="bar-fill" style="width:0%"></div>
                </div>
            </div>
        </div>

        <header id="main-header">
            <h1>Academia de Héroes</h1>
            <p style="opacity: 0.6; letter-spacing: 2px;">SOPHIA PROTOCOL v3.0 | DYNAMIC MODE</p>
        </header>

        <!-- Sophia Avatar -->
        <div id="sophia-avatar">
            <div class="core-glow" id="core-glow"></div>
            <div class="core-ring"></div>
            <div class="core-inner">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
                    <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z" />
                    <path d="M12 6v6l4 2" />
                </svg>
            </div>
        </div>

        <!-- Objective Widget -->
        <div id="objective-widget">
            <div class="objective-title">Misión en Curso</div>
            <div id="current-objective">Esperando instrucciones...</div>
        </div>

        <button id="startBtn" class="btn-primary" onclick="initMission()">
            <span>Sincronizar con Sophia</span>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
        </button>

        <div id="log-container"></div>

        <div id="voice-ui">
            <div class="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <div class="listening-text">Escuchando Recluta...</div>
        </div>
    </div>

    <!-- UTILITIES & BACKEND BRIDGE -->
    <script>
        // ✅ URL DE TU WEB APP
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQ5w6QzhGJLH3hv5akJhcB0GS-1LQQkX-Tx9PTcZOPdHteJSzI78LzOOuRb1kfnA/exec";

        // Game State
        const gameState = {
            hp: 100,
            energy: 100,
            xp: 0,
            history: [],
            isProcessing: false
        };

        async function callServer(type, text) {
            if (!SCRIPT_URL) return { success: false, error: "URL no configurada" };
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({
                        type,
                        text,
                        history: gameState.history.slice(-6) // Solo enviamos los últimos 6 mensajes para ahorrar tokens
                    })
                });
                return await res.json();
            } catch (err) {
                return { success: false, error: err.message };
            }
        }

        const logContainer = document.getElementById('log-container');
        const hpFill = document.getElementById('hp-fill');
        const energyFill = document.getElementById('energy-fill');
        const xpFill = document.getElementById('xp-fill');
        const hpVal = document.getElementById('hp-val');
        const energyVal = document.getElementById('energy-val');
        const xpVal = document.getElementById('xp-val');
        const objectiveText = document.getElementById('current-objective');
        const coreGlow = document.getElementById('core-glow');

        function updateUI(updates) {
            if (updates.hp) {
                gameState.hp = Math.min(100, Math.max(0, gameState.hp + updates.hp));
                hpFill.style.width = gameState.hp + "%";
                hpVal.textContent = gameState.hp + "%";
                if (updates.hp < 0) flashUI('alert');
            }
            if (updates.energy) {
                gameState.energy = Math.min(100, Math.max(0, gameState.energy + updates.energy));
                energyFill.style.width = gameState.energy + "%";
                energyVal.textContent = gameState.energy + "%";
            }
            if (updates.xp) {
                gameState.xp += updates.xp;
                xpVal.textContent = gameState.xp;
                xpFill.style.width = (gameState.xp % 100) + "%";
                flashUI('success');
            }
        }

        function flashUI(type) {
            const container = document.querySelector('.container');
            container.classList.add(`visual-${type}`);
            setTimeout(() => container.classList.remove(`visual-${type}`), 1000);
        }

        function addLog(text, type = 'system') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            let prefix = type === 'hero' ? '<b>SOPHIA:</b> ' : (type === 'user' ? '<b>RECLUTA:</b> ' : '');
            entry.innerHTML = prefix;
            const contentSpan = document.createElement('span');
            entry.appendChild(contentSpan);
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
            if (logContainer.style.display !== 'flex') logContainer.style.display = 'flex';
            return contentSpan;
        }

        function typeText(element, text, speed = 25) {
            return new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        element.textContent += text.charAt(i++);
                        logContainer.scrollTop = logContainer.scrollHeight;
                        setTimeout(type, speed);
                    } else { resolve(); }
                }
                type();
            });
        }
    </script>

    <!-- MATRIX BACKGROUND -->
    <script>
        const canvas = document.getElementById("heroCanvas");
        const ctx = canvas.getContext("2d");
        let width, height, columns, drops = [];
        const fontSize = 16;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / fontSize);
            drops = Array(columns).fill(1);
        }
        window.addEventListener('resize', resize);
        resize();
        function draw() {
            ctx.fillStyle = "rgba(3, 7, 18, 0.1)";
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = "#00f2ff";
            ctx.font = fontSize + "px 'JetBrains Mono'";
            for (let i = 0; i < drops.length; i++) {
                const text = "01"[Math.floor(Math.random() * 2)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>

    <!-- CORE LOGIC -->
    <script>
        const voiceUI = document.getElementById('voice-ui');

        async function speak(text, cue = 'normal') {
            try {
                // Actualizar color del core basado en visual_cue
                const colors = { normal: '#00f2ff', alert: '#ff2e63', success: '#2ecc71', critical: '#ff00c8' };
                coreGlow.style.background = `radial-gradient(circle, ${colors[cue] || colors.normal} 0%, transparent 70%)`;

                const response = await callServer('tts', text);
                if (response.success) {
                    const audio = new Audio("data:audio/mp3;base64," + response.audio);
                    const contentSpan = addLog("", 'hero');
                    audio.onplay = () => typeText(contentSpan, text);
                    await audio.play();
                    return new Promise(resolve => audio.onended = resolve);
                } else {
                    addLog("Error de voz: " + response.error, "system");
                }
            } catch (err) { console.error(err); }
        }

        function listen() {
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Recognition) return addLog("Navegador no soportado", "system");

            const rec = new Recognition();
            rec.lang = 'es-US';
            voiceUI.style.display = 'flex';

            rec.onresult = async event => {
                const transcript = event.results[0][0].transcript;
                addLog(transcript, 'user');
                gameState.history.push({ role: "user", text: transcript });
                voiceUI.style.display = 'none';
                handleResponse(transcript);
            };

            rec.onerror = () => { voiceUI.style.display = 'none'; setTimeout(listen, 1000); };
            rec.start();
        }

        async function initMission() {
            if (!SCRIPT_URL) return alert("Configura SCRIPT_URL");
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('main-header').classList.add('hidden');
            document.getElementById('rpg-stats').style.display = 'flex';
            document.getElementById('sophia-avatar').style.display = 'flex';
            document.getElementById('objective-widget').style.display = 'block';

            handleResponse("INICIAR PROTOCOLO");
        }

        async function handleResponse(userInput) {
            if (gameState.isProcessing) return;
            gameState.isProcessing = true;

            const aiRes = await callServer('ia', userInput);

            if (aiRes.success) {
                const data = aiRes.data;
                gameState.history.push({ role: "model", text: JSON.stringify(data) });

                // Actualizar UI
                objectiveText.textContent = data.objective;
                if (data.status_updates) updateUI(data.status_updates);

                // Hablar
                await speak(data.speech, data.visual_cue);

                if (data.mission_complete) {
                    addLog("¡MISIÓN FINALIZADA CON ÉXITO!", "system");
                    setTimeout(() => window.location.reload(), 5000);
                } else {
                    gameState.isProcessing = false;
                    listen();
                }
            } else {
                addLog("Error en enlace neuronal: " + aiRes.error, "system");
                gameState.isProcessing = false;
            }
        }
    </script>
</body>

</html>
