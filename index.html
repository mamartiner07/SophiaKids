    <script>
        // ✅ URL DE TU WEB APP - ¡CÓPIALA AQUÍ!
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPaC0PeFKGXS1m12roP3QFLwMDEKMX9HOaTtguWIWIAjxwsCv7ZvBaY9IEaCvRg0I/exec";

        // Game State
        const gameState = {
            hp: 100,
            energy: 100,
            xp: 0,
            history: [],
            isProcessing: false
        };

        async function callServer(type, text) {
            console.log(`[Server] Calling ${type}...`);
            if (!SCRIPT_URL || SCRIPT_URL === "") {
                console.error("[Server] SCRIPT_URL is empty");
                return { success: false, error: "DEBUG: Debes configurar SCRIPT_URL en la línea 407 de index.html" };
            }
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    mode: "cors",
                    body: JSON.stringify({
                        type,
                        text,
                        history: gameState.history.slice(-6)
                    })
                });
                if (!res.ok) {
                    console.error(`[Server] HTTP Error: ${res.status}`);
                    return { success: false, error: `Error HTTP ${res.status}` };
                }
                const data = await res.json();
                console.log("[Server] Response received:", data);
                return data;
            } catch (err) {
                console.error("[Server] Fetch Error:", err);
                return { success: false, error: err.message };
            }
        }

        const logContainer = document.getElementById('log-container');
        const hpFill = document.getElementById('hp-fill');
        const energyFill = document.getElementById('energy-fill');
        const xpFill = document.getElementById('xp-fill');
        const hpVal = document.getElementById('hp-val');
        const energyVal = document.getElementById('energy-val');
        const xpVal = document.getElementById('xp-val');
        const objectiveText = document.getElementById('current-objective');
        const coreGlow = document.getElementById('core-glow');

        function updateUI(updates) {
            if (updates.hp !== undefined) {
                gameState.hp = Math.min(100, Math.max(0, gameState.hp + updates.hp));
                hpFill.style.width = gameState.hp + "%";
                hpVal.textContent = gameState.hp + "%";
                if (updates.hp < 0) flashUI('alert');
            }
            if (updates.energy !== undefined) {
                gameState.energy = Math.min(100, Math.max(0, gameState.energy + updates.energy));
                energyFill.style.width = gameState.energy + "%";
                energyVal.textContent = gameState.energy + "%";
            }
            if (updates.xp !== undefined) {
                gameState.xp += updates.xp;
                xpVal.textContent = gameState.xp;
                xpFill.style.width = (gameState.xp % 100) + "%";
                flashUI('success');
            }
        }

        function flashUI(type) {
            const container = document.querySelector('.container');
            if (container) {
                container.classList.add(`visual-${type}`);
                setTimeout(() => container.classList.remove(`visual-${type}`), 1000);
            }
        }

        function addLog(text, type = 'system') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            let prefix = type === 'hero' ? '<b>SD GALAXIA:</b> ' : (type === 'user' ? '<b>EXPLORADOR:</b> ' : '');
            entry.innerHTML = prefix;
            const contentSpan = document.createElement('span');
            if (text) contentSpan.textContent = text;
            entry.appendChild(contentSpan);
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
            if (logContainer.style.display !== 'flex') logContainer.style.display = 'flex';
            return contentSpan;
        }

        function typeText(element, text, speed = 20) {
            return new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        element.textContent += text.charAt(i++);
                        logContainer.scrollTop = logContainer.scrollHeight;
                        setTimeout(type, speed);
                    } else { resolve(); }
                }
                type();
            });
        }
    </script>

    <!-- STARRY BACKGROUND -->
    <script>
        const canvas = document.getElementById("heroCanvas");
        const ctx = canvas.getContext("2d");
        let width, height, stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.1,
                    opacity: Math.random()
                });
            }
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            ctx.fillStyle = "#050a14";
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();

                star.y += star.speed;
                if (star.y > height) star.y = 0;

                star.opacity += (Math.random() - 0.5) * 0.05;
                if (star.opacity < 0.1) star.opacity = 0.1;
                if (star.opacity > 1) star.opacity = 1;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>

    <script>
        const voiceUI = document.getElementById('voice-ui');

        async function speak(text, cue = 'normal') {
            try {
                console.log("[Audio] Speaking:", text);
                const colors = { normal: '#00f2ff', alert: '#ff2e63', success: '#2ecc71', critical: '#ff00c8' };
                coreGlow.style.background = `radial-gradient(circle, ${colors[cue] || colors.normal} 0%, transparent 70%)`;

                const response = await callServer('tts', text);
                if (response.success) {
                    const audio = new Audio("data:audio/mp3;base64," + response.audio);
                    const contentSpan = addLog("", 'hero');

                    return new Promise((resolve) => {
                        audio.onplay = () => typeText(contentSpan, text);
                        audio.onended = () => { console.log("[Audio] Finished"); resolve(); };
                        audio.onerror = (e) => {
                            console.error("[Audio] Error:", e);
                            contentSpan.textContent = text;
                            resolve();
                        };
                        audio.play().catch(err => {
                            console.warn("[Audio] Play blocked/failed:", err);
                            contentSpan.textContent = text;
                            resolve();
                        });
                    });
                } else {
                    addLog(text, 'hero'); // Mostrar texto aunque no haya audio
                    console.error("[Audio] TTS Failed:", response.error);
                }
            } catch (err) { console.error("[Audio] Crash:", err); }
        }

        function listen() {
            console.log("[Voice] Listening start...");
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Recognition) return addLog("Navegador no soportado para voz", "system");

            const rec = new Recognition();
            rec.lang = 'es-US';
            voiceUI.style.display = 'flex';

            rec.onresult = async event => {
                const transcript = event.results[0][0].transcript;
                console.log("[Voice] Result:", transcript);
                addLog(transcript, 'user');
                gameState.history.push({ role: "user", text: transcript });
                voiceUI.style.display = 'none';
                handleResponse(transcript);
            };

            rec.onerror = (e) => {
                console.warn("[Voice] Error:", e.error);
                voiceUI.style.display = 'none';
                if (e.error !== 'aborted') setTimeout(listen, 1000);
            };

            rec.onend = () => {
                console.log("[Voice] recognition ended");
                if (!gameState.isProcessing) {
                    voiceUI.style.display = 'none';
                }
            };
            rec.start();
        }

        // Cargar Assets al inicio
        function loadAssets() {
            const logoImg = document.getElementById('main-logo');
            const textLogo = document.getElementById('text-logo');
            if (typeof ASSETS !== 'undefined' && ASSETS.LOGO_B64 && ASSETS.LOGO_B64 !== "PLACEHOLDER_B64") {
                console.log("[App] Assets found, loading logo...");
                logoImg.src = ASSETS.LOGO_B64;
                logoImg.classList.remove('hidden');
                textLogo.classList.add('hidden');
            }
        }

        async function initMission() {
            console.log("[App] Initializing mission...");
            if (!SCRIPT_URL || SCRIPT_URL === "") {
                addLog("ERROR: SCRIPT_URL no configurada. Edita index.html en la línea 540.", "system");
                alert("Debes configurar la SCRIPT_URL en index.html antes de empezar.");
                return;
            }

            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('main-header').classList.add('hidden');
            document.getElementById('rpg-stats').style.display = 'flex';
            document.getElementById('sophia-avatar').style.display = 'flex';
            document.getElementById('objective-widget').style.display = 'block';

            handleResponse("INICIAR PROTOCOLO");
        }

        async function handleResponse(userInput) {
            if (gameState.isProcessing) { console.warn("[Logic] Already processing"); return; }
            gameState.isProcessing = true;
            console.log("[Logic] Handling input:", userInput);

            const loadingLog = addLog("¡Llamando a la Galaxia! ...", "system");

            try {
                const aiRes = await callServer('ia', userInput);
                if (loadingLog.parentElement) loadingLog.parentElement.remove();

                if (aiRes.success) {
                    const data = aiRes.data;
                    console.log("[Logic] AI Data parsed:", data);
                    gameState.history.push({ role: "model", text: JSON.stringify(data) });

                    objectiveText.textContent = data.objective || "¡Esperando órdenes! ️‍♂️";
                    if (data.status_updates) updateUI(data.status_updates);

                    // Botones de acción rápida
                    const actionContainer = document.getElementById('quick-actions');
                    actionContainer.innerHTML = '';
                    if (data.quick_actions && data.quick_actions.length > 0) {
                        data.quick_actions.forEach(act => {
                            const btn = document.createElement('button');
                            btn.className = 'action-btn';
                            btn.textContent = act;
                            btn.onclick = () => {
                                addLog(act, 'user');
                                handleResponse(act);
                                actionContainer.innerHTML = ''; // Limpiar tras clic
                            };
                            actionContainer.appendChild(btn);
                        });
                    }

                    await speak(data.speech || "...", data.visual_cue);

                    if (data.mission_complete) {
                        addLog("¡MISIÓN FINALIZADA!", "system");
                        setTimeout(() => window.location.reload(), 5000);
                    } else {
                        gameState.isProcessing = false;
                        listen();
                    }
                } else {
                    addLog("Error en enlace: " + aiRes.error, "system");
                    gameState.isProcessing = false;
                    // Reintentar si falla la conexión? No por ahora, mejor que el usuario revise la URL.
                }
            } catch (err) {
                console.error("[Logic] Crash:", err);
                addLog("Error crítico: " + err.message, "system");
                gameState.isProcessing = false;
            }
        }

        // Ejecutar carga de assets al cargar el script
        loadAssets();
    </script>
</body>

</html>
